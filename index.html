<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Space Ranger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="shared.css">
</head>

<body>

    <!-- ORIGINAL star canvas — untouched -->
    <canvas id="stars"></canvas>

    <!-- ORIGINAL header — untouched -->
    <header>
        <div class="logo">SPACE RANGER</div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="contact.html">Contact Us</a>
            <a href="about.html">About Us</a>
            <a href="how2play.html">How to play</a>
        </nav>

        <div class="music-controls">
            <button id="musicToggle" class="music-btn">🔇</button>
            <audio id="bgMusic" loop>
                <source src="bg-music.mp3" type="audio/mpeg">
            </audio>
        </div>
    
    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</header>

<!-- Mobile nav drawer (outside header) -->
<nav class="mobile-nav-drawer" id="mobileNavDrawer">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact Us</a>
    <a href="about.html">About Us</a>
    <a href="how2play.html">How to play</a>
</nav>

    <!-- REDESIGNED hero section -->
    <section class="hero">

        <!-- Ship display with rings -->
        <div class="ship-container">
            <div class="ship-ring ship-ring--outer"></div>
            <div class="ship-ring ship-ring--mid"></div>
            <div class="ship-ring ship-ring--inner"></div>
            <div class="ship-glow"></div>
            <img src="shooter.png" class="ship-img" alt="Space Ranger ship">
        </div>

        <!-- Title -->
        <div class="title-block">
            <p class="title-eyebrow">— MISSION BRIEFING —</p>
            <h1 class="heroTitle">SPACE RANGER</h1>
            <p class="title-sub">DEFEND THE GALAXY. SURVIVE THE VOID.</p>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button onclick="location.href='game.html'" class="heroBtn heroBtn--primary">
                <span class="heroBtn__shimmer"></span>
                <span class="heroBtn__label">▶&nbsp;&nbsp;LAUNCH MISSION</span>
            </button>

            <button onclick="location.href='how2play.html'" class="heroBtn heroBtn--secondary">
                <span class="heroBtn__shimmer"></span>
                <span class="heroBtn__label">?&nbsp;&nbsp;HOW TO PLAY</span>
            </button>
        </div>

        <!-- Stats strip -->
        <div class="stats-strip">
            <div class="stat">
                <span class="stat__label">HIGH SCORE</span>
                <span class="stat__value" id="hsDisplay">—</span>
            </div>
            <div class="stat-divider">//</div>
            <div class="stat">
                <span class="stat__label">STATUS</span>
                <span class="stat__value stat__value--online">● ONLINE</span>
            </div>
            <div class="stat-divider">//</div>
            <div class="stat">
                <span class="stat__label">SECTOR</span>
                <span class="stat__value">ALPHA-7</span>
            </div>
        </div>

    </section>

    <footer>
        © 2026 Space Ranger | All Rights Reserved
    </footer>

    <script src="game.js"></script>
    <script>
        const hs = localStorage.getItem('highScore');
        const el = document.getElementById('hsDisplay');
        if (el && hs && parseInt(hs) > 0) el.textContent = parseInt(hs).toLocaleString();
    </script>

    <!-- Shared header: scroll-shrink + active nav link -->
    <script>
    (function() {
        // Scroll shrink
        window.addEventListener("scroll", function() {
            document.querySelector("header").classList.toggle("scrolled", window.scrollY > 40);
        }, { passive: true });

        // Mark current page link as active
        var links = document.querySelectorAll("header .nav-links a");
        var page  = location.pathname.split("/").pop() || "index.html";
        links.forEach(function(a) {
            if (a.getAttribute("href") === page) a.classList.add("active");
        });

        // Sync music-btn class with bgMusic element
        var bgMusic = document.getElementById("bgMusic");
        var musicBtn = document.querySelector("header .music-btn");
        if (bgMusic && musicBtn) {
            bgMusic.addEventListener("play",  function(){ musicBtn.classList.add("music-playing"); });
            bgMusic.addEventListener("pause", function(){ musicBtn.classList.remove("music-playing"); });
        }
    })();
    </script>

    <!-- Hamburger menu JS -->
    <script>
    (function() {
        var btn = document.getElementById('hamburgerBtn');
        var drawer = document.getElementById('mobileNavDrawer');
        if (!btn || !drawer) return;
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var open = btn.classList.toggle('open');
            drawer.classList.toggle('open', open);
        });
        document.addEventListener('click', function(e) {
            if (!btn.contains(e.target) && !drawer.contains(e.target)) {
                btn.classList.remove('open');
                drawer.classList.remove('open');
            }
        });
        // Mark active link
        var links = drawer.querySelectorAll('a');
        var page = location.pathname.split('/').pop() || 'index.html';
        links.forEach(function(a) {
            if (a.getAttribute('href') === page) a.classList.add('active');
        });
    })();
    </script>
</body>
</html>
